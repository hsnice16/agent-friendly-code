name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Lint · Format · Typecheck · Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.16

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install
        run: bun install --frozen-lockfile

      - name: Biome check (lint + format)
        run: bun x @biomejs/biome ci .

      - name: Typecheck
        run: bun x tsc --noEmit

      - name: Test
        run: bun run test
