# https://lefthook.dev/configuration/
#
# Activate locally: `bun run prepare-hooks` (alias for `lefthook install`).

pre-commit:
  parallel: true
  jobs:
    - name: biome
      glob: "*.{js,ts,jsx,tsx,json,jsonc,css}"
      run: bun x @biomejs/biome check --write --no-errors-on-unmatched {staged_files}
      stage_fixed: true

    - name: typecheck
      glob: "*.{ts,tsx}"
      run: bun x tsc --noEmit

    - name: test
      glob: "*.{ts,tsx}"
      run: bun run test

    - name: file-length
      glob: "{app,components,lib}/**/*.{ts,tsx}"
      run: |
        wc -l {staged_files} | awk '$2 != "total" && $1 > 300 { printf "✗ %s: %d lines (cap: 300)\n", $2, $1; bad=1 } END { exit bad+0 }'
